# skeptic allowlist for bincast/releaser
# Minimal TLS layer — agent built HTTP client from stdlib,
# only needs the encryption pipe.

[[allow]]
name = "rustls"
ecosystem = "cargo"
category = "vetted"
approved_by = "belser"
approved_at = "2026-04-07"
justification = "Pure Rust TLS — wraps existing stdlib TcpStream. ~20 transitive deps vs 197 for reqwest."

[[allow]]
name = "webpki-roots"
ecosystem = "cargo"
category = "vetted"
approved_by = "belser"
approved_at = "2026-04-07"
justification = "Mozilla CA root certificates for TLS verification. Companion to rustls."
